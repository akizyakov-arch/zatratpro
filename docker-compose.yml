services:
  zatratpro-db:
    image: postgres:16-alpine
    container_name: zatratpro-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - zatratpro_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zatratpro-bot:
    build: .
    container_name: zatratpro-bot
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      zatratpro-db:
        condition: service_healthy
    volumes:
      - ./tmp:/app/tmp
      - ./storage:/app/storage
    dns:
      - 1.1.1.1
      - 8.8.8.8

volumes:
  zatratpro_postgres_data:
